<style>
  :root {
    --green: #00C853;
    --green-dim: #00a844;
    --dark: #0a0f0d;
    --surface: #111815;
    --surface2: #1a2420;
    --border: #2a3d36;
    --text: #e8f5f0;
    --text-dim: #7a9e8e;
    --accent: #ff6b35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Geologica', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .logo {
    width: 38px;
    height: 38px;
    background: var(--green);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: var(--dark);
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .header-text p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    margin-left: auto;
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Messages */
  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.bot { background: var(--green); color: var(--dark); font-weight: 700; font-size: 12px; }
  .avatar.user { background: var(--surface2); color: var(--text-dim); }

  .bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg.bot .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .msg.user .bubble {
    background: var(--green);
    color: var(--dark);
    border-top-right-radius: 4px;
    font-weight: 500;
  }

  /* Links in bot messages */
  .result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 8px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
  }

  .result-item:hover {
    border-color: var(--green);
    background: rgba(0, 200, 83, 0.06);
    transform: translateX(2px);
  }

  .result-icon {
    width: 32px;
    height: 32px;
    background: rgba(0, 200, 83, 0.1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .result-text { flex: 1; min-width: 0; }
  .result-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .result-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .result-arrow { color: var(--green); font-size: 16px; flex-shrink: 0; }

  /* Suggestions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .suggestion {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Geologica', sans-serif;
    transition: all 0.2s;
  }

  .suggestion:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0, 200, 83, 0.05);
  }

  /* Input area */
  .input-area {
    padding: 16px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  #userInput {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Geologica', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 22px;
    max-height: 80px;

    background: var(--green);

    border-radius: 12px;
    cursor: pointer;

    align-items: center;
    justify-content: center;
    transition: all 0.2s;

  }

  .send-btn:active { transform: scale(0.95); }

  .send-btn svg { width: 18px; height: 18px; fill: var(--dark); }

  .hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    text-align: center;

  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;

  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }

function searchProject(query) {
  const q = query.toLowerCase().trim();
  if (q.length < 3) return null;

  // 1. Exact match
  const exact = projects.filter(p => p.name.toLowerCase() === q);
  if (exact.length) return exact;

  // 2. Full query contained in name
  const fullMatch = projects.filter(p => p.name.toLowerCase().includes(q));
  if (fullMatch.length) return fullMatch;

  // 3. All words match
  const words = q.split(' ').filter(w => w.length > 2);
  if (words.length > 0) {
    const allWords = projects.filter(p => {
      const name = p.name.toLowerCase();
      return words.every(w => name.includes(w));
    });
    if (allWords.length) return allWords;

    // 4. Single long word — only if unique
    const anyWord = projects.filter(p => {
      const name = p.name.toLowerCase();
      return words.some(w => w.length >= 5 && name.includes(w));
    });
    if (anyWord.length === 1) return anyWord;
  }

  return null;
}

          <div style="font-weight:600;color:${deltaColor};">${p.delta}</div>
        </div>
        <div style="background:var(--surface2);padding:6px 10px;border-radius:8px;">
          <div style="color:var(--text-dim);font-size:11px;">Прогноз Q2</div>
          <div style="font-weight:600;color:#00C853;">${p.forecast_q2}</div>
        </div>
      </div>
    </div>`;
}

function search(query) {
  const q = query.toLowerCase().trim();
  return docs.filter(doc =>
    doc.keywords.some(k => q.includes(k) || k.includes(q)) ||
    doc.name.toLowerCase().includes(q) ||
    doc.desc.toLowerCase().includes(q)
  );
}

function addMessage(html, type) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  if (type === 'user') {
    div.innerHTML = `<div class="avatar user">👤</div><div class="bubble">${html}</div>`;
  } else {
    div.innerHTML = `<div class="avatar bot">ОТ</div><div class="bubble">${html}</div>`;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="avatar bot">ОТ</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function buildResults(results) {
  if (!results.length) return null;
  return results.map(r =>
    `<a href="${r.url}" target="_blank" class="result-item">
      <div class="result-icon">${r.icon}</div>
      <div class="result-text">
        <div class="result-name">${r.name}</div>
        <div class="result-desc">${r.desc}</div>
      </div>
      <div class="result-arrow">→</div>
    </a>`
  ).join('');
}

function quickSearch(q) {
  document.getElementById('userInput').value = q;
  sendMessage();
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const query = input.value.trim();
  if (!query) return;

  addMessage(query, 'user');
  input.value = '';
  input.style.height = 'auto';

  showTyping();

  setTimeout(() => {
    removeTyping();
    
    const projectResults = searchProject(query);
    const docResults = search(query);

    // If project found — always show it first
    if (projectResults && projectResults.length) {
      const cards = projectResults.map(p => buildKpiCard(p)).join('');
      // Also show docs if any (but not if they overlap with project name)
      const extraDocs = docResults.filter(d => !projectResults.some(p => p.name.toLowerCase().includes(d.name.toLowerCase().substring(0, 5))));
      if (extraDocs.length) {
        const links = buildResults(extraDocs);
        addMessage(`Ось дані по проєкту:${cards}<br>А також документи:${links}`, 'bot');
      } else {
        addMessage(`Ось дані по ${projectResults.length === 1 ? 'проєкту' : projectResults.length + ' проєктах'}:${cards}`, 'bot');
      }
    } else if (docResults.length) {
      const links = buildResults(docResults);
      addMessage(`Знайшла ${docResults.length === 1 ? 'ось що' : docResults.length + ' документи'}:${links}`, 'bot');
    } else {
      addMessage(`😔 Не знайшла нічого за запитом <strong>"${query}"</strong>.<br><br>Спробуй інше слово або напиши Вікторії — вона додасть потрібний документ.`, 'bot');
    }
  }, 600);
}
</script>
</body>
</html>
